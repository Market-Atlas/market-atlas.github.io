name: Build & deploy Atlas

on:
  push:
    branches: [main]
  schedule:
    # Nightly rebuild at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install pipeline deps
        working-directory: pipeline
        run: |
          pip install -r requirements.txt
          pip install -r requirements-ingest.txt

      # Re-ingest data on the nightly cron / manual dispatch. Push builds reuse
      # whatever JSON is committed to the repo (fast deploys).
      - name: Refresh FX rates (always)
        working-directory: pipeline
        run: python -m atlas_pipeline.fetch_fx

      - name: Refresh data from yfinance
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        working-directory: pipeline
        run: python -m atlas_pipeline.ingest --universe us,in --workers 4

      - name: Build derived artifacts (search index, screener, peers)
        working-directory: pipeline
        run: python -m atlas_pipeline.build

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Sync data into frontend
        working-directory: frontend
        run: npm run sync-data

      - name: Build static site
        working-directory: frontend
        env:
          # For an org/user root site (<name>.github.io) the path is /, so leave
          # basePath empty. For project pages set it to /<repo>. The frontend's
          # next.config.js normaliser treats '/' as empty too, so this works
          # even if GitHub Actions expression quirks leak a stray '/'.
          NEXT_PUBLIC_BASE_PATH: ${{ endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}', github.event.repository.name) }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
